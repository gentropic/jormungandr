<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>jorm</title>
<script>
// first-paint theme, before CSS: stored choice, else OS preference
(function () {
  var t = null;
  try { t = localStorage.getItem('jorm.theme'); } catch (e) {}
  if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  document.documentElement.dataset.theme = t;
})();
</script>
<style>
/* ── Switchboard 1.3 tokens, verbatim (auditable/ext/switchboard) ────────── */
:root {
  --sw-bg-deep:#C2C1BE; --sw-bg:#D2D1CE; --sw-bg-raised:#E4E3E1; --sw-bg-bright:#EDECEB;
  --sw-text:#232322; --sw-text-mid:#504F4C; --sw-text-soft:#5A5856;
  --sw-border:#B3B1AD; --sw-border-soft:#C6C4C1; --sw-rule:#A5A3A0;
  --sw-orange:#8B3F00; --sw-orange-soft:#FDE0CF;
  --sw-blue:#005C97;   --sw-blue-soft:#CCE9FE;
  --sw-green:#00602B;  --sw-green-soft:#D2ECD7;
  --sw-yellow:#6F5700; --sw-yellow-soft:#F1E4CB;
  --sw-red:#99191E;    --sw-red-soft:#FFDDD8;
  --sw-violet:#793A8D; --sw-violet-soft:#F2DFF7;
  --sw-mono:'Space Mono','JetBrains Mono','Consolas',monospace;
  --sw-sans:'Barlow',system-ui,sans-serif;
  --sw-radius:3px; --sw-radius-lg:4px;
  --sw-dur-fast:0.12s; --sw-dur:0.2s; --sw-ease:cubic-bezier(0.2,0,0,1);
}
[data-theme="dark"] {
  --sw-bg-deep:#0E1012; --sw-bg:#15171A; --sw-bg-raised:#1D2024; --sw-bg-bright:#25282D;
  --sw-text:#DDDCDA; --sw-text-mid:#9E9C98; --sw-text-soft:#83817E;
  --sw-border:#2F3338; --sw-border-soft:#24272B; --sw-rule:#3A3E44;
  --sw-orange:#FB9044; --sw-orange-soft:#2E2119;
  --sw-blue:#008CD1;   --sw-blue-soft:#16262F;
  --sw-green:#5CCB80;  --sw-green-soft:#1A261D;
  --sw-yellow:#FFD73A; --sw-yellow-soft:#292317;
  --sw-red:#E75A51;    --sw-red-soft:#30201D;
  --sw-violet:#EC9FFF; --sw-violet-soft:#2A212C;
}
:root {
  --au-surface-deep:var(--sw-bg-deep); --au-surface:var(--sw-bg);
  --au-surface-raised:var(--sw-bg-raised); --au-surface-bright:var(--sw-bg-bright);
  --au-fg:var(--sw-text); --au-fg-muted:var(--sw-text-mid); --au-fg-soft:var(--sw-text-soft);
  --au-border:var(--sw-border); --au-border-soft:var(--sw-border-soft); --au-rule:var(--sw-rule);
  --au-action:var(--sw-orange); --au-action-soft:var(--sw-orange-soft);
  --au-info:var(--sw-blue); --au-info-soft:var(--sw-blue-soft);
  --au-success:var(--sw-green); --au-success-soft:var(--sw-green-soft);
  --au-warn:var(--sw-yellow); --au-warn-soft:var(--sw-yellow-soft);
  --au-error:var(--sw-red); --au-error-soft:var(--sw-red-soft);
  --au-selected:var(--sw-violet); --au-selected-soft:var(--sw-violet-soft);
  --au-font-mono:var(--sw-mono); --au-font-sans:var(--sw-sans);
  --au-radius:var(--sw-radius); --au-radius-lg:var(--sw-radius-lg);
  --au-dur-fast:var(--sw-dur-fast); --au-dur:var(--sw-dur); --au-ease:var(--sw-ease);
}

* { box-sizing:border-box; }
html,body { margin:0; height:100%; }
body { background:var(--au-surface); color:var(--au-fg); font:400 14.5px/1.55 var(--au-font-sans); }
.app { display:flex; flex-direction:column; min-height:100vh; }

.mast { display:flex; align-items:center; gap:1rem; flex-wrap:wrap;
  padding:.55rem 1rem; background:var(--au-surface-raised); border-bottom:1px solid var(--au-rule); }
.brand { display:flex; align-items:baseline; gap:.55rem; }
.brand b { font:700 1rem var(--au-font-sans); letter-spacing:.08em; }
.brand .kana { font:400 .62rem var(--au-font-mono); color:var(--au-fg-soft); letter-spacing:.18em; }
.hostchip { font:700 .7rem var(--au-font-mono); letter-spacing:.1em; color:var(--au-info);
  background:var(--au-info-soft); border-radius:var(--au-radius); padding:.1rem .45rem; }
.mast-gauges { display:flex; gap:1.1rem; align-items:center; margin-left:auto; }
.mgauge { display:flex; flex-direction:column; gap:.05rem; }
.mgauge .lbl { font:400 .62rem var(--au-font-mono); letter-spacing:.18em; color:var(--au-fg-soft); text-transform:uppercase; }
.mgauge .val { font:700 .95rem var(--au-font-mono); font-variant-numeric:tabular-nums;
  display:flex; align-items:center; gap:.4rem; min-height:1.35rem; }
#tick { color:var(--au-success); opacity:.15; transition:opacity .55s var(--au-ease); }
#tick.lit { opacity:1; transition:none; }
#link.up { color:var(--au-success); } #link.down { color:var(--au-error); }

.stalebar { display:none; align-items:center; gap:.6rem; padding:.4rem 1rem;
  background:var(--au-warn-soft); color:var(--au-warn); border-bottom:1px solid var(--au-border);
  font:700 .72rem var(--au-font-mono); letter-spacing:.12em; text-transform:uppercase; }
.app.stale .stalebar { display:flex; }
.app.stale .cols { filter:grayscale(.55) contrast(.92); opacity:.62; }

.toasts { position:fixed; right:1rem; bottom:1rem; display:flex; flex-direction:column;
  gap:.4rem; z-index:1000; max-width:34rem; }
.toast { font:400 .78rem var(--au-font-mono); border-radius:var(--au-radius);
  padding:.45rem .7rem; border:1px solid var(--au-border); }
.toast.fault { color:var(--au-error); background:var(--au-error-soft); }
.toast.info { color:var(--au-info); background:var(--au-info-soft); }

.cols { display:flex; flex:1; min-height:0; }
.tree { width:200px; flex:none; background:var(--au-surface-raised);
  border-right:1px solid var(--au-border); padding:.5rem 0; }
.tree .sect { font:400 .62rem var(--au-font-mono); letter-spacing:.22em; text-transform:uppercase;
  color:var(--au-fg-soft); padding:.35rem .8rem .2rem; }
.trow { display:flex; align-items:center; gap:.5rem; width:100%; text-align:left;
  font:400 .78rem var(--au-font-mono); color:var(--au-fg); background:none; border:none;
  border-left:2px solid transparent; padding:.3rem .8rem; cursor:pointer; }
.trow.g { padding-left:1.6rem; }
.trow:hover { background:var(--au-surface-bright); }
.trow.sel { background:var(--au-selected-soft); border-left-color:var(--au-selected); }
.trow .st { width:1em; text-align:center; }
.st.go { color:var(--au-success); } .st.fault { color:var(--au-error); }
.st.caution { color:var(--au-warn); } .st.off { color:var(--au-fg-soft); }

.content { flex:1; min-width:0; padding:0 1rem 1.5rem; }
.tabs { display:flex; gap:.15rem; border-bottom:1px solid var(--au-rule); margin:0 -1rem 1rem; padding:0 1rem; }
.tab { font:700 .72rem var(--au-font-mono); letter-spacing:.14em; text-transform:uppercase;
  color:var(--au-fg-muted); background:none; border:none; cursor:pointer;
  padding:.55rem .7rem .45rem; border-bottom:2px solid transparent; margin-bottom:-1px; }
.tab:hover { color:var(--au-fg); background:var(--au-surface-bright); }
.tab.on { color:var(--au-fg); border-bottom-color:var(--au-selected); }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(310px,1fr)); gap:1rem; align-items:start; }

.panel { background:var(--au-surface-raised); border:1px solid var(--au-border); border-radius:var(--au-radius-lg); }
.panel-hd { display:flex; justify-content:space-between; align-items:center; gap:.6rem;
  background:var(--au-surface-bright); border-bottom:1px solid var(--au-border);
  border-radius:var(--au-radius-lg) var(--au-radius-lg) 0 0;
  font:400 .72rem var(--au-font-mono); letter-spacing:.14em; text-transform:uppercase;
  color:var(--au-fg-muted); padding:.4rem .7rem; }
.panel-bd { padding:.7rem; }
.dot { display:inline-block; width:7px; height:7px; border-radius:50%;
  background:var(--au-success); box-shadow:0 0 0 2px var(--au-success-soft); margin-right:.45rem; }

.badge { display:inline-flex; align-items:center; gap:.35rem;
  font:700 .66rem var(--au-font-mono); letter-spacing:.1em; text-transform:uppercase;
  border-radius:var(--au-radius); padding:.12rem .5rem; }
.badge::before { content:'●'; font-size:.7em; }
.badge.go { color:var(--au-success); background:var(--au-success-soft); }
.badge.fault { color:var(--au-error); background:var(--au-error-soft); }
.badge.caution { color:var(--au-warn); background:var(--au-warn-soft); }
.badge.info { color:var(--au-info); background:var(--au-info-soft); }
.badge.off { color:var(--au-fg-soft); background:var(--au-surface-bright); }

.btn { font:700 .78rem var(--au-font-mono); letter-spacing:.1em; text-transform:uppercase;
  border-radius:var(--au-radius); padding:.4rem .9rem; cursor:pointer;
  transition:filter var(--au-dur-fast) var(--au-ease); }
.btn:hover { filter:brightness(1.08); } .btn:active { filter:brightness(.92); }
.btn:focus-visible { outline:2px solid var(--au-action); outline-offset:1px; }
.btn[disabled] { opacity:.5; cursor:not-allowed; }
.btn.primary { background:var(--au-action); color:#FFFFFF; border:none; }
.btn.secondary { background:transparent; color:var(--au-fg); border:1px solid var(--au-border); }
.btn.secondary:hover { color:var(--au-action); border-color:var(--au-action); }
.btn.ghost { background:transparent; color:var(--au-info); border:none; }

.kv { display:grid; grid-template-columns:max-content 1fr; gap:.2rem .9rem;
  font:400 .78rem var(--au-font-mono); margin:0; }
.kv dt { color:var(--au-fg-soft); text-transform:uppercase; letter-spacing:.12em; font-size:.66rem; padding-top:.15rem; }
.kv dd { margin:0; font-variant-numeric:tabular-nums; overflow-wrap:anywhere; }
table.cl { width:100%; border-collapse:collapse; font:400 .78rem var(--au-font-mono); }
.cl th { font:400 .62rem var(--au-font-mono); letter-spacing:.18em; text-transform:uppercase;
  color:var(--au-fg-soft); text-align:left; padding:.25rem .5rem; border-bottom:1px solid var(--au-border); }
.cl td { padding:.3rem .5rem; border-bottom:1px solid var(--au-border-soft); font-variant-numeric:tabular-nums; }

.readout { background:var(--au-surface-deep); border:1px solid var(--au-border); border-radius:var(--au-radius-lg); }
.readout-top { display:flex; justify-content:space-between; font:400 .66rem var(--au-font-mono);
  letter-spacing:.14em; text-transform:uppercase; color:var(--au-fg-muted);
  padding:.4rem .7rem; border-bottom:1px solid var(--au-border-soft); }
.readout-bd { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:.7rem; padding:.7rem; }
.gauge .glbl { font:400 .62rem var(--au-font-mono); letter-spacing:.18em; text-transform:uppercase; color:var(--au-fg-soft); }
.gauge .gval { font:700 1.35rem var(--au-font-mono); font-variant-numeric:tabular-nums; }
.gauge .gval .unit { font-size:.68rem; font-weight:400; color:var(--au-fg-soft); margin-left:.2rem; }
.gauge.go .gval { color:var(--au-success); } .gauge.caution .gval { color:var(--au-warn); }
.gauge.fault .gval { color:var(--au-error); }

.term { background:var(--au-surface-deep); border:1px solid var(--au-border);
  border-radius:var(--au-radius-lg); padding:.6rem .7rem; overflow:auto; max-height:60vh;
  font:400 .78rem/1.6 var(--au-font-mono); }
.term .row { white-space:pre-wrap; }
.term .t { color:var(--au-fg-soft); margin-right:.6rem; }
.term .lv { display:inline-block; width:3.4em; color:var(--au-fg-soft); }
.term .sys { color:var(--au-info); } .term .err { color:var(--au-error); }
.term .topic { color:var(--au-info); display:inline-block; min-width:15em; margin-right:.6em; }
.term .row.uiline, .term .row.uiline .topic { color:var(--au-action); }

svg.spark { display:block; }
.sp-line { fill:none; stroke:var(--au-fg-muted); stroke-width:1.2; }
.sp-fill { fill:var(--au-border-soft); opacity:.5; stroke:none; }
.sp-dot { fill:var(--au-info); }

.field { display:flex; flex-direction:column; gap:.2rem; margin-bottom:.7rem; }
.field label { font:400 .7rem var(--au-font-mono); letter-spacing:.12em; text-transform:uppercase; color:var(--au-fg-soft); }
.field input { font:400 .9rem var(--au-font-mono); color:var(--au-fg);
  background:var(--au-surface); border:1px solid var(--au-border); border-radius:var(--au-radius);
  padding:.35rem .5rem; }
.field input:focus-visible { outline:none; border-color:var(--au-action); box-shadow:0 0 0 3px var(--au-action-soft); }

.note { font:400 .72rem var(--au-font-mono); color:var(--au-fg-soft); }
.busbar { display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; margin-bottom:.6rem;
  font:400 .78rem var(--au-font-mono); }
.busbar input { font:400 .8rem var(--au-font-mono); background:var(--au-surface);
  color:var(--au-fg); border:1px solid var(--au-border); border-radius:var(--au-radius); padding:.3rem .5rem; }
pre.tb { font:400 .74rem/1.5 var(--au-font-mono); color:var(--au-error);
  background:var(--au-error-soft); border-radius:var(--au-radius); padding:.5rem .6rem;
  overflow-x:auto; margin:.6rem 0 0; }

.login { max-width:22rem; margin:12vh auto; }

/* declarative panels (spec §7) */
.pblock { margin-top:0; }
.pblock .gval { min-height:1.6rem; }
input[type=range] { accent-color:var(--au-action); width:100%; }
.gbar { height:4px; background:var(--au-border-soft); border-radius:2px; margin-top:.3rem; }
.gbar i { display:block; height:100%; width:0; background:var(--au-success); border-radius:2px; }
.stale-p { filter:grayscale(.6); opacity:.6; }
.wsel { font:400 .85rem var(--au-font-mono); background:var(--au-surface); color:var(--au-fg);
  border:1px solid var(--au-border); border-radius:var(--au-radius); padding:.25rem .4rem; }
.btn.armed { color:var(--au-warn); border-color:var(--au-warn); }
.wtext { font:400 .74rem/1.5 var(--au-font-mono); white-space:pre-wrap; }
.wind { font:700 .9rem var(--au-font-mono); }

@media (prefers-reduced-motion: reduce) { .btn { transition:none; } }
@media (max-width: 760px) {
  .cols { flex-direction:column; }
  .tree { width:auto; border-right:none; border-bottom:1px solid var(--au-border);
    display:flex; flex-wrap:wrap; gap:.1rem; padding:.3rem; }
  .tree .sect { width:100%; }
  .trow, .trow.g { padding:.3rem .6rem; width:auto; border-left:none; border-radius:var(--au-radius); }
  .trow.sel { border-left:none; }
}
</style>
</head>
<body>
<div class="app" id="app">
  <header class="mast">
    <span class="brand"><b>JORMUNGANDR</b><span class="kana">ヨルムンガンド</span></span>
    <span class="hostchip" id="hostchip">…</span>
    <span class="mast-gauges" id="mastg" hidden>
      <span class="mgauge"><span class="lbl">Heap</span>
        <span class="val"><span id="heapval">—</span>
          <svg class="spark" id="sp-heap" width="72" height="22" viewBox="0 0 72 22"></svg></span></span>
      <span class="mgauge"><span class="lbl">Uptime</span><span class="val" id="upval">—</span></span>
      <span class="mgauge"><span class="lbl">Guests</span><span class="val" id="gval">—</span></span>
      <span class="mgauge"><span class="lbl">Link · Tick</span>
        <span class="val"><span id="link" class="down">◉</span><span id="tick">◉</span></span></span>
      <button class="btn ghost" id="themebtn" title="theme">◐</button>
    </span>
  </header>
  <div class="stalebar">⚠ signal lost — <span id="stalesecs">last data ? s ago</span> · reconnecting…</div>
  <div class="cols" id="cols">
    <nav class="tree" id="tree"></nav>
    <main class="content" id="main"></main>
  </div>
</div>
<div class="toasts" id="toasts"></div>

<script>
'use strict';
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const SCROLLBACK = 500;

const S = {
  base: '', token: '',
  node: null, nodeAt: 0, guests: {}, heap: [],
  sel: null,                       // null = node, else guest id
  tabNode: 'summary', tabGuest: 'overview',
  ws: null, scope: ['$sys/#'], lastMsg: 0, retry: 0,
  conWS: null, logTimer: null, busPaused: false,
  panels: {}, bindWatch: {}, bindState: {}, liveWidgets: [],
};
try {
  S.token = localStorage.getItem('jorm.token') || '';
  S.base = localStorage.getItem('jorm.url') || '';
} catch (e) {}
if (!S.base && location.protocol !== 'file:') S.base = location.origin;

// ── plumbing ────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Authorization': 'Bearer ' + S.token } };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const resp = await fetch(S.base + path, opts);
  if (resp.status === 401) { logout('token refused by the node'); throw new Error('unauthorized'); }
  const data = await resp.json().catch(() => ({}));
  if (!resp.ok) throw new Error(data.error || (resp.status + ''));
  return data;
}

function toast(text, cls) {
  const el = document.createElement('div');
  el.className = 'toast ' + (cls || 'info');
  el.textContent = text;
  $('#toasts').appendChild(el);
  setTimeout(() => el.remove(), 6000);
}

function spark(el, data) {
  if (!el || data.length < 2) return;
  const w = el.viewBox.baseVal.width, h = el.viewBox.baseVal.height;
  const min = Math.min(...data), max = Math.max(...data);
  const pts = data.map((v, i) => [(i / (data.length - 1)) * w,
    h - 2 - ((v - min) / ((max - min) || 1)) * (h - 4)]);
  const line = pts.map(p => p.map(n => n.toFixed(1)).join(',')).join(' ');
  const last = pts[pts.length - 1];
  el.innerHTML = `<polygon class="sp-fill" points="0,${h} ${line} ${w},${h}"/>` +
    `<polyline class="sp-line" points="${line}"/>` +
    `<circle class="sp-dot" cx="${last[0]}" cy="${last[1]}" r="2"/>`;
}

const hhmmss = ts => new Date(ts * 1000).toTimeString().slice(0, 8);
function termLine(host, html, cls) {
  const row = document.createElement('div');
  row.className = 'row' + (cls ? ' ' + cls : '');
  row.innerHTML = html;
  host.appendChild(row);
  while (host.childNodes.length > SCROLLBACK) host.removeChild(host.firstChild);
  host.scrollTop = host.scrollHeight;
}
const consoleHTML = l =>
  `<span class="t">${hhmmss(l.ts)}</span><span class="lv ${l.level === 'sys' ? 'sys' : l.level === 'error' ? 'err' : ''}">${esc(l.level)}</span>${esc(l.text)}`;

// ── websocket: one socket, $sys/# always, # while the bus tab is open ──────
function connect() {
  const url = S.base.replace(/^http/, 'ws') + '/api/bus?token=' + encodeURIComponent(S.token);
  let ws;
  try { ws = new WebSocket(url); } catch (e) { return scheduleReconnect(); }
  S.ws = ws;
  ws.onopen = () => {
    S.retry = 0;
    $('#link').className = 'up';
    ws.send(JSON.stringify({ op: 'sub', filters: currentScope() }));
    S.scope = currentScope();
    refresh();
  };
  ws.onmessage = ev => {
    S.lastMsg = Date.now();
    let frame; try { frame = JSON.parse(ev.data); } catch (e) { return; }
    if (frame.topic !== undefined) route(frame.topic, frame.msg);
    else if (frame.error) toast('bus: ' + frame.error, 'fault');
  };
  ws.onclose = () => { $('#link').className = 'down'; scheduleReconnect(); };
  ws.onerror = () => { try { ws.close(); } catch (e) {} };
}
function scheduleReconnect() {
  if (!S.token) return;
  const delay = Math.min(30, 2 ** S.retry++) * 1000;
  setTimeout(connect, delay);
}
function setScope(filters) {
  // Idempotent by contract: a re-subscribe re-delivers retained messages, and
  // retained $sys/$ui messages trigger a re-render, which calls setScope. An
  // unconditional send here is a feedback storm that drowns the socket.
  const same = filters.length === S.scope.length &&
    filters.every((f, i) => f === S.scope[i]);
  S.scope = filters;
  if (same || !S.ws || S.ws.readyState !== 1) return;
  S.ws.send(JSON.stringify({ op: 'sub', filters }));
}
function currentScope() {
  const filters = ['$sys/#', '$ui/#'];
  if (S.sel === null && S.tabNode === 'bus') filters.push('#');
  for (const t of Object.keys(S.bindWatch)) filters.push(t);
  return filters;
}

// Staleness: the pulse is data or it is nothing.
//
// A node that dies does NOT close its socket. Real silicon just stops — no FIN,
// no close frame — so the browser holds a zombie socket reporting OPEN for as
// long as TCP takes to give up (minutes). An open-but-silent socket is not a
// link that is up: we drive liveness from the ticks, and when they stop we
// close the socket ourselves, which turns the light red and starts the
// reconnect backoff that would otherwise never run. (The sim could never show
// this: killing a process closes its socket politely.)
setInterval(() => {
  if (!S.token || !S.lastMsg) return;
  const age = Date.now() - S.lastMsg;
  const stale = age > 3500;
  $('#app').classList.toggle('stale', stale);
  if (!stale) return;
  $('#stalesecs').textContent = 'last data ' + Math.round(age / 1000) + ' s ago';
  $('#link').className = 'down';
  if (S.ws && S.ws.readyState === 1) {
    try { S.ws.close(); } catch (e) {}   // onclose schedules the reconnect
  }
}, 1000);

function route(topic, msg) {
  if (topic === '$sys/clock/tick') {
    const tick = $('#tick');
    tick.classList.add('lit');
    clearTimeout(tick._decay);
    tick._decay = setTimeout(() => tick.classList.remove('lit'), 220);
    renderMastGauges();
  } else if (topic === '$sys/heap' && msg) {
    S.heap.push(msg.free / 1048576);
    if (S.heap.length > 40) S.heap.shift();
    renderMastGauges();
    const g = $('#sum-heap'); if (g) g.firstChild.textContent = S.heap[S.heap.length - 1].toFixed(2);
    spark($('#sp-heap'), S.heap); spark($('#sp-heap2'), S.heap);
  } else if (topic.startsWith('$ui/')) {
    const parts = topic.split('/');
    if (parts[2] === 'panel') {
      if (msg) S.panels[parts[1]] = msg; else delete S.panels[parts[1]];
      if ((S.sel === null && S.tabNode === 'dashboard') ||
          (S.sel === parts[1] && S.tabGuest === 'overview')) renderMain();
    }
  } else if (topic.startsWith('$sys/guest/')) {
    const id = topic.split('/')[2];
    if (msg && S.guests[id]) {
      S.guests[id].state = msg.state;
      renderTree(); renderMastGauges();
      if (S.sel === id && S.tabGuest === 'overview') renderMain();
      if (S.sel === null && S.tabNode === 'summary') renderMain();
    } else if (msg) {
      refresh();  // a guest we don't know — reconcile
    }
  }
  if (S.bindWatch[topic]) {
    S.bindState[topic] = msg;
    for (const reg of S.liveWidgets)
      if (reg.topic === topic) applyWidget(reg, resolve(msg, reg.w.path));
  }
  const bus = $('#busterm');
  if (bus && !S.busPaused) {
    const ui = msg && typeof msg === 'object' && msg.origin === 'ui';
    termLine(bus, `<span class="t">${new Date().toTimeString().slice(0, 8)}</span>` +
      `<span class="topic">${ui ? '▸ ' : ''}${esc(topic)}</span>${esc(JSON.stringify(msg))}`,
      ui ? 'uiline' : '');
  }
}

// ── data ────────────────────────────────────────────────────────────────────
async function refresh() {
  try {
    S.node = await api('GET', '/api/node');
    S.nodeAt = Date.now();
    const list = await api('GET', '/api/guests');
    S.guests = {};
    for (const g of list) S.guests[g.id] = g;
    document.title = 'jorm · ' + S.node.hostname;
    $('#hostchip').textContent = S.node.hostname;
    $('#mastg').hidden = false;
    renderTree(); renderMastGauges(); renderMain();
  } catch (e) {
    if (e.message !== 'unauthorized') toast('refresh: ' + e.message, 'fault');
  }
}

const GLYPH = { running: ['●', 'go'], stopped: ['○', 'off'], crashed: ['✗', 'fault'],
  unresponsive: ['⚠', 'caution'], starting: ['◌', 'caution'], stopping: ['◌', 'caution'] };
const BADGE = { running: 'go', stopped: 'off', crashed: 'fault',
  unresponsive: 'caution', starting: 'caution', stopping: 'caution' };

// ── render ──────────────────────────────────────────────────────────────────
function renderMastGauges() {
  if (!S.node) return;
  if (S.heap.length) $('#heapval').textContent = S.heap[S.heap.length - 1].toFixed(2) + 'M';
  const up = S.node.uptime_ms + (Date.now() - S.nodeAt);
  const h = Math.floor(up / 3600000), m = Math.floor(up / 60000) % 60, s = Math.floor(up / 1000) % 60;
  $('#upval').textContent = (h ? h + ':' : '') +
    String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  const ids = Object.keys(S.guests);
  $('#gval').textContent =
    ids.filter(id => S.guests[id].state === 'running').length + '/' + ids.length;
}

function renderTree() {
  const rows = [`<div class="sect">Node</div>`,
    `<button class="trow${S.sel === null ? ' sel' : ''}" data-id=""><span class="st go">◉</span>${esc(S.node ? S.node.hostname : '…')}</button>`,
    `<div class="sect">Guests</div>`];
  for (const id of Object.keys(S.guests).sort()) {
    const [gl, cls] = GLYPH[S.guests[id].state] || ['?', 'off'];
    rows.push(`<button class="trow g${S.sel === id ? ' sel' : ''}" data-id="${esc(id)}">` +
      `<span class="st ${cls}">${gl}</span>${esc(id)}</button>`);
  }
  if (!Object.keys(S.guests).length) rows.push(`<div class="note" style="padding:.3rem .8rem">none installed</div>`);
  $('#tree').innerHTML = rows.join('');
  $('#tree').querySelectorAll('.trow').forEach(row => row.onclick = () => select(row.dataset.id || null));
}

function select(id) {
  teardown();
  S.sel = id;
  renderTree(); renderMain();
}
function setTab(tab) {
  teardown();
  if (S.sel === null) S.tabNode = tab; else S.tabGuest = tab;
  renderMain();
}
function teardown() {
  if (S.conWS) { try { S.conWS.close(); } catch (e) {} S.conWS = null; }
  if (S.logTimer) { clearInterval(S.logTimer); S.logTimer = null; }
}

function tabsHTML(tabs, active) {
  return '<div class="tabs">' + tabs.map(t =>
    `<button class="tab${t === active ? ' on' : ''}" data-tab="${t}">${t}</button>`).join('') + '</div>';
}

function renderMain() {
  const main = $('#main');
  S.liveWidgets = [];
  S.bindWatch = {};
  if (S.sel === null) renderNode(main); else renderGuest(main, S.sel);
  main.querySelectorAll('.tab').forEach(tab => tab.onclick = () => setTab(tab.dataset.tab));
  main.querySelectorAll('[data-panel]').forEach(el => wirePanel(el.dataset.panel));
  setScope(currentScope());
}

function renderNode(main) {
  const tab = S.tabNode;
  let body = '';
  if (tab === 'summary' && S.node) {
    const n = S.node;
    const rows = Object.keys(S.guests).sort().map(id => {
      const g = S.guests[id];
      return `<tr><td>${esc(id)}</td><td><span class="badge ${BADGE[g.state] || 'off'}">${esc(g.state)}</span>` +
        (g.suspected ? ' <span class="badge caution">suspected</span>' : '') +
        `</td><td class="note">${esc(g.status || '—')}</td></tr>`;
    }).join('');
    body = `<div class="grid">
      <div class="readout" style="grid-column:1/-1">
        <div class="readout-top"><span>Node readout · ${esc(n.hostname)}</span><span>uplink ◉</span></div>
        <div class="readout-bd">
          <div class="gauge go"><div class="glbl">Heap free</div>
            <div class="gval" id="sum-heap">${S.heap.length ? S.heap[S.heap.length - 1].toFixed(2) : '—'}<span class="unit">MB</span></div>
            <svg class="spark" id="sp-heap2" width="110" height="26" viewBox="0 0 110 26"></svg></div>
          <div class="gauge"><div class="glbl">Alloc</div>
            <div class="gval">${(n.heap_alloc / 1024).toFixed(0)}<span class="unit">KB</span></div></div>
          <div class="gauge go"><div class="glbl">Running</div>
            <div class="gval">${Object.values(S.guests).filter(g => g.state === 'running').length}<span class="unit">/${Object.keys(S.guests).length}</span></div></div>
        </div>
      </div>
      <div class="panel"><div class="panel-hd"><span><span class="dot"></span>Node</span><span>${esc(n.profile)}</span></div>
        <div class="panel-bd"><dl class="kv">
          <dt>board</dt><dd>${esc(n.board)}</dd>
          <dt>profile</dt><dd>${esc(n.profile)} · spec ${n.spec}</dd>
          <dt>version</dt><dd>${esc(n.version)}</dd>
          <dt>ip</dt><dd>${esc(n.ip || '—')}</dd>
          <dt>runtimes</dt><dd>${esc((n.runtimes || []).join(' · '))}</dd>
        </dl></div></div>
      <div class="panel"><div class="panel-hd"><span>Guests</span><span>${Object.keys(S.guests).length} installed</span></div>
        <div class="panel-bd"><table class="cl">
          <tr><th>id</th><th>state</th><th>status</th></tr>${rows}</table></div></div>
    </div>`;
  } else if (tab === 'dashboard') {
    const ids = Object.keys(S.panels).sort();
    body = ids.length
      ? '<div class="grid">' + ids.map(panelBlock).join('') + '</div>'
      : '<p class="note">no guest has declared a panel — hal.ui.panel(widgets) puts one here (spec §7)</p>';
  } else if (tab === 'bus') {
    body = `<div class="busbar">
        <span class="badge info">sub #</span>
        <button class="btn secondary" id="pausebtn">${S.busPaused ? '▶ resume' : '⏸ pause'}</button>
        <span class="note">ring ${SCROLLBACK} · ▸ orange = origin: ui</span>
        <span style="flex:1"></span>
        <input id="pubtopic" placeholder="topic" size="18">
        <input id="pubmsg" placeholder="msg (JSON)" size="16">
        <label class="note"><input type="checkbox" id="pubretain"> retain</label>
        <button class="btn primary" id="pubbtn">pub</button>
      </div>
      <div class="term" id="busterm"></div>`;
  } else if (tab === 'claims') {
    body = `<div class="panel"><div class="panel-hd"><span>Claims table</span><span>who owns what</span></div>
      <div class="panel-bd" id="claimsbody"><span class="note">loading…</span></div></div>`;
  } else if (tab === 'log') {
    body = `<div class="term" id="logterm"></div>`;
  }
  main.innerHTML = tabsHTML(['summary', 'dashboard', 'bus', 'claims', 'log'], tab) + body;

  if (tab === 'summary') spark($('#sp-heap2'), S.heap);
  if (tab === 'bus') {
    $('#pausebtn').onclick = () => { S.busPaused = !S.busPaused;
      $('#pausebtn').textContent = S.busPaused ? '▶ resume' : '⏸ pause'; };
    $('#pubbtn').onclick = async () => {
      let msg = $('#pubmsg').value;
      try { msg = JSON.parse(msg); } catch (e) {}
      try {
        await api('POST', '/api/bus/publish',
          { topic: $('#pubtopic').value, msg, retain: $('#pubretain').checked });
      } catch (e) { toast('publish: ' + e.message, 'fault'); }
    };
  }
  if (tab === 'claims') loadClaims();
  if (tab === 'log') {
    loadLog();
    S.logTimer = setInterval(loadLog, 5000);
  }
}

async function loadClaims() {
  try {
    const t = await api('GET', '/api/claims');
    const host = $('#claimsbody'); if (!host) return;
    const rows = t.pins.map(p =>
      `<tr><td>pin ${p.pin}</td><td>${esc(p.mode)}</td><td>${esc(p.owners.join(' · '))}</td>` +
      `<td>${p.mode === 'in-shared' ? `<span class="note">${p.owners.length} watcher${p.owners.length > 1 ? 's' : ''}</span>` : ''}</td></tr>`);
    host.innerHTML = (t.reserved_pins && t.reserved_pins.length
        ? `<p class="note" style="margin:0 0 .5rem">reserved by the supervisor: pin ${t.reserved_pins.join(', ')}</p>` : '') +
      (rows.length
        ? `<table class="cl"><tr><th>resource</th><th>mode</th><th>owner</th><th></th></tr>${rows.join('')}</table>`
        : '<span class="note">nothing passed through — the table is empty</span>');
  } catch (e) { toast('claims: ' + e.message, 'fault'); }
}

async function loadLog() {
  try {
    const got = await api('GET', '/api/node/log?n=' + SCROLLBACK);
    const host = $('#logterm'); if (!host) return;
    host.innerHTML = '';
    for (const l of got.lines) termLine(host, consoleHTML(l));
  } catch (e) { toast('log: ' + e.message, 'fault'); }
}

async function loadConfig(id) {
  const host = $('#cfgbody');
  let got;
  try { got = await api('GET', '/api/guests/' + id + '/config'); }
  catch (e) { host.innerHTML = '<span class="note">config: ' + esc(e.message) + '</span>'; return; }
  if (!got.schema) {
    host.innerHTML = '<span class="note">no config schema declared — hal.ui.config(fields) puts a form here</span>';
    return;
  }
  host.innerHTML = got.schema.map(f => {
    const val = got.values[f.key];
    const pending = got.pending_restart.includes(f.key);
    const chips = (f.live ? ' <span class="badge info">live</span>' : '') +
      (pending ? ' <span class="badge caution">⚠ pending restart</span>' : '');
    let ctl = '';
    if (f.w === 'slider') {
      ctl = `<div style="display:flex;gap:.6rem;align-items:center">
        <input type="range" data-key="${esc(f.key)}" data-w="slider" min="${f.min}" max="${f.max}"
          step="${f.step || 1}" value="${val}"
          oninput="this.nextElementSibling.textContent = this.value + ' ${esc(f.unit || '')}'">
        <span class="note" style="min-width:5.5em">${val} ${esc(f.unit || '')}</span></div>`;
    } else if (f.w === 'toggle') {
      ctl = `<label class="note"><input type="checkbox" data-key="${esc(f.key)}" data-w="toggle"
        ${val ? 'checked' : ''}> ${val ? 'on' : 'off'}</label>`;
    } else if (f.w === 'select') {
      ctl = `<select class="wsel" data-key="${esc(f.key)}" data-w="select">` +
        (f.options || []).map(o => `<option${o === val ? ' selected' : ''}>${esc(o)}</option>`).join('') +
        '</select>';
    } else {
      ctl = `<input class="wsel" data-key="${esc(f.key)}" data-w="text" value="${esc(val ?? '')}">`;
    }
    return `<div class="field"><label>${esc(f.label || f.key)}${chips}</label>${ctl}</div>`;
  }).join('') +
  (got.undeclared.length
    ? `<p class="note">⚠ in the store but no longer declared: ${got.undeclared.map(esc).join(', ')}</p>` : '') +
  '<p style="margin:.4rem 0 0"><button class="btn primary" id="cfgsave">save</button></p>';
  $('#cfgsave').onclick = async () => {
    const updates = {};
    host.querySelectorAll('[data-key]').forEach(el => {
      const w = el.dataset.w;
      updates[el.dataset.key] = w === 'slider' ? Number(el.value)
        : w === 'toggle' ? el.checked : el.value;
    });
    try {
      const res = await api('PUT', '/api/guests/' + id + '/config', updates);
      toast('config saved' +
        (res.applied_live.length ? ' · live: ' + res.applied_live.join(', ') : '') +
        (res.pending_restart.length ? ' · pending restart: ' + res.pending_restart.join(', ') : ''),
        res.pending_restart.length ? 'fault' : 'info');
      loadConfig(id);
    } catch (e) { toast('config: ' + e.message, 'fault'); }
  };
}

// ── declarative panels (spec §7): the supervisor's file renders, guests declare
function resolve(msg, path) {
  if (path == null) return msg;
  let v = msg;
  for (const seg of String(path).split('.')) v = v == null ? v : v[seg];
  return v;
}

function panelBlock(gid) {
  const decl = S.panels[gid];
  if (!decl || !decl.widgets) return '';
  const g = S.guests[gid];
  const stale = !g || g.state !== 'running';
  const cells = decl.widgets.map((w, i) => {
    const wid = `w-${gid}-${i}`;
    const span = w.size === 'l' ? ' style="grid-column:1/-1"' : '';
    const label = esc(w.label || w.id);
    let inner = '';
    if (w.w === 'value' || w.w === 'gauge') {
      inner = `<div class="gval"><span id="${wid}">—</span>` +
        (w.unit ? `<span class="unit">${esc(w.unit)}</span>` : '') + '</div>' +
        (w.w === 'gauge' ? `<div class="gbar"><i id="${wid}-bar"></i></div>` : '') +
        (w.spark ? `<svg class="spark" id="${wid}-sp" width="90" height="20" viewBox="0 0 90 20"></svg>` : '');
    } else if (w.w === 'indicator') {
      inner = `<div class="wind" id="${wid}"><span class="st off">○</span> —</div>`;
    } else if (w.w === 'text') {
      inner = `<div class="wtext" id="${wid}">—</div>`;
    } else if (w.w === 'button') {
      inner = `<button class="btn secondary" id="${wid}">${label}</button>`;
    } else if (w.w === 'toggle') {
      inner = `<button class="btn secondary" id="${wid}" data-on="0">—</button>`;
    } else if (w.w === 'slider') {
      inner = `<input type="range" id="${wid}" min="${w.min}" max="${w.max}" step="${w.step || 1}">` +
        `<span class="note" id="${wid}-lbl">—</span>`;
    } else if (w.w === 'select') {
      inner = `<select class="wsel" id="${wid}">` +
        (w.options || []).map(o => `<option>${esc(o)}</option>`).join('') + '</select>';
    }
    return `<div class="gauge"${span}><div class="glbl">${label}</div>${inner}</div>`;
  }).join('');
  return `<div class="readout pblock${stale ? ' stale-p' : ''}" data-panel="${esc(gid)}">
    <div class="readout-top"><span>Panel · ${esc(gid)}</span>
      <span>${stale ? 'frozen — guest ' + esc(g ? g.state : 'removed') : '◉ live'}</span></div>
    <div class="readout-bd">${cells}</div></div>`;
}

function wirePanel(gid) {
  const decl = S.panels[gid];
  if (!decl || !decl.widgets) return;
  decl.widgets.forEach((w, i) => {
    const el = document.getElementById(`w-${gid}-${i}`);
    if (!el) return;
    const reg = { topic: w.bind, w, el, hist: [] };
    if (w.bind) {
      S.liveWidgets.push(reg);
      S.bindWatch[w.bind] = 1;
      if (S.bindState[w.bind] !== undefined)
        applyWidget(reg, resolve(S.bindState[w.bind], w.path));
    }
    if (w.set) {
      const pub = value => api('POST', '/api/bus/publish',
        { topic: w.set, msg: (value && typeof value === 'object')
            ? Object.assign({ origin: 'ui' }, value)
            : { value, origin: 'ui' } })
        .catch(e => toast(w.set + ': ' + e.message, 'fault'));
      if (w.w === 'button') el.onclick = () => {
        if (w.confirm && el.dataset.armed !== '1') {
          el.dataset.armed = '1';
          el.classList.add('armed');
          el.textContent = 'confirm?';
          setTimeout(() => { el.dataset.armed = '0'; el.classList.remove('armed');
            el.textContent = w.label || w.id; }, 3000);
          return;
        }
        el.dataset.armed = '0'; el.classList.remove('armed');
        el.textContent = w.label || w.id;
        pub(w.msg === undefined ? { pressed: true } : w.msg);
      };
      if (w.w === 'toggle') el.onclick = () => {
        const next = el.dataset.on !== '1';
        applyWidget(reg, next);  // optimistic; the bind state confirms or reverts
        pub(next);
        setTimeout(() => { const s = resolve(S.bindState[w.bind], w.path);
          if (s !== undefined) applyWidget(reg, s); }, 5000);
      };
      if (w.w === 'slider') el.onchange = () => pub(Number(el.value));
      if (w.w === 'select') el.onchange = () => pub(el.value);
    }
  });
}

function applyWidget(reg, val) {
  const { w, el } = reg;
  if (val === undefined || el == null) return;
  if (w.w === 'value' || w.w === 'gauge') {
    el.textContent = typeof val === 'number' && w.fmt ? w.fmt.replace('%v', val) : String(val);
    if (w.w === 'gauge') {
      const bar = document.getElementById(el.id + '-bar');
      if (bar && typeof val === 'number') {
        const lo = w.min ?? 0, hi = w.max ?? 100;
        bar.style.width = Math.max(0, Math.min(100, (val - lo) / (hi - lo) * 100)) + '%';
      }
    }
    const sp = document.getElementById(el.id + '-sp');
    if (sp && typeof val === 'number') {
      reg.hist.push(val);
      if (reg.hist.length > 40) reg.hist.shift();
      spark(sp, reg.hist);
    }
  } else if (w.w === 'indicator') {
    const on = !!val;
    el.innerHTML = on ? '<span class="st go">●</span> ' + esc(w.on || 'on')
                      : '<span class="st off">○</span> ' + esc(w.off || 'off');
  } else if (w.w === 'text') {
    if (w.lines) {
      reg.hist.push(String(val));
      if (reg.hist.length > w.lines) reg.hist.shift();
      el.textContent = reg.hist.join('\n');
    } else el.textContent = String(val);
  } else if (w.w === 'toggle') {
    el.dataset.on = val ? '1' : '0';
    el.textContent = val ? '● on' : '○ off';
    el.style.color = val ? 'var(--au-success)' : '';
  } else if (w.w === 'slider') {
    if (document.activeElement !== el) el.value = val;
    const lbl = document.getElementById(el.id + '-lbl');
    if (lbl) lbl.textContent = val + ' ' + (w.unit || '');
  } else if (w.w === 'select') {
    el.value = String(val);
  }
}

async function loadGuestDetail(id) {
  try {
    const d = await api('GET', '/api/guests/' + id);
    const host = $('#gclaims'); if (!host) return;
    const pins = (d.claims.pins || []).map(p =>
      `<tr><td>pin ${p.pin}</td><td>${esc(p.mode)}</td><td></td></tr>`).join('');
    const subs = (d.bus.subs || []).map(s =>
      `<tr><td>sub ${esc(s.filters.join(' '))}</td><td>${s.depth}/${s.qlen} queued</td>` +
      `<td>${s.drops ? `<span class="badge caution">${s.drops} dropped</span>` : '<span class="note">0 drops</span>'}</td></tr>`).join('');
    host.innerHTML = `<table class="cl">${pins}${subs}
      <tr><td>published</td><td>${d.bus.published}</td><td></td></tr></table>`;
    if (d.traceback && $('#gdetail'))
      $('#gdetail').innerHTML = `<pre class="tb">${esc(d.traceback.trim())}</pre>`;
  } catch (e) { toast('guest: ' + e.message, 'fault'); }
}

async function act(id, verb, btn) {
  btn.disabled = true;
  const label = btn.textContent;
  btn.textContent = '…';
  try {
    await api('POST', `/api/guests/${id}/${verb}`);
    // the retained $sys state transition re-renders; this is just the fallback
    setTimeout(refresh, 400);
  } catch (e) {
    toast(`${verb} ${id}: ${e.message}`, 'fault');
    btn.disabled = false; btn.textContent = label;
  }
}

function openConsole(id) {
  const host = $('#conterm');
  const url = S.base.replace(/^http/, 'ws') +
    `/api/guests/${id}/console/stream?token=` + encodeURIComponent(S.token);
  let ws;
  try { ws = new WebSocket(url); } catch (e) { return toast('console: ' + e.message, 'fault'); }
  S.conWS = ws;
  ws.onmessage = ev => {
    let line; try { line = JSON.parse(ev.data); } catch (e) { return; }
    termLine(host, consoleHTML(line), line.level === 'error' ? '' : '');
  };
  ws.onclose = () => { if (S.conWS === ws) termLine(host, `<span class="lv sys">sys</span>— stream closed —`); };
}

// ── login ───────────────────────────────────────────────────────────────────
function logout(reason) {
  S.token = '';
  try { localStorage.removeItem('jorm.token'); } catch (e) {}
  if (S.ws) try { S.ws.close(); } catch (e) {}
  renderLogin(reason);
}
function renderLogin(reason) {
  $('#hostchip').textContent = '—';
  $('#mastg').hidden = true;
  $('#tree').innerHTML = '';
  $('#main').innerHTML = `<div class="login panel">
    <div class="panel-hd"><span><span class="dot" style="background:var(--au-fg-soft)"></span>Connect</span><span>jorm</span></div>
    <div class="panel-bd">
      ${reason ? `<p class="note" style="color:var(--au-error); margin:0 0 .6rem">✗ ${esc(reason)}</p>` : ''}
      <div class="field"><label>node url</label>
        <input id="in-url" value="${esc(S.base)}" placeholder="http://jorm-c510.local"></div>
      <div class="field"><label>bearer token</label>
        <input id="in-token" type="password" value=""></div>
      <p style="margin:.4rem 0 0"><button class="btn primary" id="connectbtn">connect</button></p>
    </div></div>`;
  $('#connectbtn').onclick = () => {
    S.base = $('#in-url').value.replace(/\/+$/, '');
    S.token = $('#in-token').value.trim();
    if (!S.base || !S.token) return;
    try {
      localStorage.setItem('jorm.url', S.base);
      localStorage.setItem('jorm.token', S.token);
    } catch (e) {}
    boot();
  };
  $('#in-token').addEventListener('keydown', ev => { if (ev.key === 'Enter') $('#connectbtn').click(); });
}

// ── boot ────────────────────────────────────────────────────────────────────
$('#themebtn').onclick = () => {
  const r = document.documentElement;
  r.dataset.theme = r.dataset.theme === 'dark' ? 'light' : 'dark';
  try { localStorage.setItem('jorm.theme', r.dataset.theme); } catch (e) {}
};
function boot() {
  if (!S.token || !S.base) return renderLogin();
  S.lastMsg = 0; S.retry = 0;
  connect();
}
boot();
</script>
